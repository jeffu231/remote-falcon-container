name: Build and Publish Image to GitHub Container Registry

on:
  schedule:
    # Runs daily at 00:00 Central
    - cron: '50 23 * * *'
      timezone: 'America/Chicago'
  # trigger manual
  workflow_dispatch:
  
env:
  REGISTRY: ghcr.io
  HOSTNAME: ${{ secrets.HOSTNAME }}
  WEB_URL: "https://${{ secrets.HOSTNAME }}"
  HOSTNAME_PARTS: ${{ vars.HOSTNAME_PARTS }}
  CONTROL_PANEL_SUBDOMAIN: ${{secrets.CONTROL_PANEL_SUBDOMAIN}}
  GA_TRACKING_ID: ${{ secrets.GA_TRACKING_ID }}
  JWT_VIEWER: ${{ secrets.JWT_KEY }}
      
jobs:
  check-commits:
    runs-on: ubuntu-latest
    outputs:
      execute_build: ${{ steps.commit-check.outputs.execute_build }}
      
    steps:
      - name: Check for New Commits in External Repo
        id: commit-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Change to your target organization/user and repository name
          TARGET_REPO: "Remote-Falcon/remote-falcon-platform" 
          TARGET_BRANCH: "main"
           # Detects if the event triggering the run is a manual click
          IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "$IS_MANUAL" = "true" ]; then
            echo "Workflow triggered manually. Bypassing external commit check."
            echo "execute_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Fetch the ISO 8601 timestamp of the latest commit on the target branch
          LAST_COMMIT_DATE=$(gh api repos/$TARGET_REPO/commits/$TARGET_BRANCH --jq '.commit.committer.date')
          echo "Last commit date: $LAST_COMMIT_DATE"
          
          # Convert timestamps to epoch seconds
          COMMIT_EPOCH=$(date -d "$LAST_COMMIT_DATE" +%s)
          NOW_EPOCH=$(date +%s)
          
          # Calculate elapsed time in seconds (24 hours = 86400 seconds)
          AGE_SECONDS=$((NOW_EPOCH - COMMIT_EPOCH))
          echo "Commit age: $AGE_SECONDS seconds"
          
          if [ $AGE_SECONDS -le 86400 ]; then
            echo "New commits found within the last 24 hours."
            echo "execute_build=true" >> $GITHUB_OUTPUT
          else
            echo "No new commits found in the last 24 hours."
            echo "execute_build=false" >> $GITHUB_OUTPUT
          fi
      
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write

    # Wait for the check job to finish, then evaluate the condition once for the whole job
    needs: [check-commits]
    if: needs.check-commits.outputs.execute_build == 'true'

    steps:
      - name: Set current date as VERSION environment variable
        run: echo "VERSION=$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v7

      - name: Checkout Remote Falcon
        uses: actions/checkout@v7
        with:
          repository: 'Remote-Falcon/remote-falcon-platform'
          path: 'remote-falcon-platform' # Saves into a local subfolder

      - name: Build all of the services
        run: |
          docker compose build

      - name: Push Docker images for plugins-api
        run: |
          docker compose push plugins-api
          docker tag ghcr.io/jeffu231/rf-plugins-api:latest ghcr.io/jeffu231/rf-plugins-api:$VERSION
          docker push ghcr.io/jeffu231/rf-plugins-api:$VERSION

      - name: Push Docker images for control-panel
        run: |
          docker compose push control-panel
          docker tag ghcr.io/jeffu231/rf-control-panel:latest ghcr.io/jeffu231/rf-control-panel:$VERSION
          docker push ghcr.io/jeffu231/rf-control-panel:$VERSION

      - name: Push Docker images for viewer
        run: |
          docker compose build viewer
          docker compose push viewer
          docker tag ghcr.io/jeffu231/rf-viewer:latest ghcr.io/jeffu231/rf-viewer:$VERSION
          docker push ghcr.io/jeffu231/rf-viewer:$VERSION
      
      - name: Push Docker images for ui
        run: |
          docker compose push ui
          docker tag ghcr.io/jeffu231/rf-ui:latest ghcr.io/jeffu231/rf-ui:$VERSION
          docker push ghcr.io/jeffu231/rf-ui:$VERSION
