### Simplified compose file to build Remote Falcon for self hosting

services:
  plugins-api:
    image: ghcr.io/jeffu231/rf-plugins-api
    build:
      context: ./remote-falcon-platform
      dockerfile: apps/plugins-api/Dockerfile.dev
    
  control-panel:
    image: ghcr.io/jeffu231/rf-control-panel
    build:
      context: ./remote-falcon-platform
      dockerfile: apps/control-panel/Dockerfile.dev
    
  viewer:
    image: ghcr.io/jeffu231/rf-viewer
    build:
      context: ./remote-falcon-platform
      dockerfile: apps/viewer/Dockerfile.dev
   
  ui:
    image: ghcr.io/jeffu231/rf-ui
    build:
      context: ./remote-falcon-platform/apps/ui
      dockerfile: Dockerfile
      args:
        HOST_ENV: prod
        VERSION: ${VERSION:-self-host}
        CONTROL_PANEL_API: ${WEB_URL}/remote-falcon-control-panel
        VIEWER_API: ${WEB_URL}/remote-falcon-viewer
        VIEWER_JWT_KEY: ${JWT_VIEWER}
        GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_KEY:-}
        PUBLIC_POSTHOG_KEY: ${PUBLIC_POSTHOG_KEY:-}
        GA_TRACKING_ID: ${GA_TRACKING_ID:-}
        HOSTNAME_PARTS: ${HOSTNAME_PARTS:-2}
        SWAP_CP: ${SWAP_CP:-false}
        VIEWER_PAGE_SUBDOMAIN: ${VIEWER_PAGE_SUBDOMAIN:-}
        # Path-routed self-host (issue #151). Set both to run the control panel
        # and viewers on two fixed hosts instead of per-show subdomains, e.g.
        #   CONTROL_HOST=control.example.com  VIEWER_HOST=lightshow.example.com
        # Then point both hostnames at this UI service in your reverse proxy.
        # Leave blank for the default subdomain-based routing.
        CONTROL_HOST: ${CONTROL_HOST:-}
        VIEWER_HOST: ${VIEWER_HOST:-}
        CONTROL_PANEL_SUBDOMAIN: ${CONTROL_PANEL_SUBDOMAIN:-}
    depends_on:
      - control-panel
      - viewer

